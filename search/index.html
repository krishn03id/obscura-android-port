<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obscura Metasearch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    padding: 50px 20px 10px;
  }
  .header h1 {
    font-size: 2.4rem;
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .header p {
    color: #555;
    font-size: 0.85rem;
  }
  .provider-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .badge {
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid #333;
    color: #888;
  }

  /* --- Search Box --- */
  .search-box {
    max-width: 680px;
    margin: 20px auto;
    padding: 0 16px;
    display: flex;
    gap: 8px;
  }
  .search-box input {
    flex: 1;
    padding: 14px 20px;
    font-size: 1rem;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    background: #14141f;
    color: #e0e0e0;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: #6366f1; }
  .search-box input::placeholder { color: #555; }
  .search-box button {
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-box button:hover { opacity: 0.9; }
  .search-box button:active { transform: scale(0.97); }
  .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* --- Status --- */
  .status {
    text-align: center;
    color: #8b5cf6;
    font-size: 0.85rem;
    padding: 8px;
    min-height: 20px;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #8b5cf644;
    border-top-color: #8b5cf6;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Layout --- */
  .main-content {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* --- AI Answer Panel --- */
  .ai-answer {
    background: linear-gradient(135deg, #15152a, #1a1a2e);
    border: 1px solid #2a2a4a;
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .ai-answer-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .ai-answer-header .icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
  }
  .ai-answer-header .label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #999;
  }
  .ai-answer-body {
    font-size: 0.95rem;
    line-height: 1.7;
    color: #ccc;
    white-space: pre-wrap;
  }
  .ai-answer-body sup {
    font-size: 0.65rem;
    color: #8ab4f8;
    background: #1e2a4a;
    padding: 1px 5px;
    border-radius: 4px;
    margin: 0 1px;
    cursor: pointer;
    vertical-align: super;
    text-decoration: none;
    transition: background 0.15s;
  }
  .ai-answer-body sup:hover { background: #2a3a5a; }

  /* --- Results --- */
  .results-header {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-card {
    background: #14141f;
    border: 1px solid #22222e;
    border-radius: 12px;
    padding: 16px 22px;
    margin-bottom: 10px;
    transition: border-color 0.2s, transform 0.15s;
  }
  .result-card:hover {
    border-color: #3a3a4a;
    transform: translateY(-1px);
  }
  .result-card .source-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .source-tag {
    font-size: 0.65rem;
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .source-tag.duckduckgo { background: #1a2a1a; color: #6abf6a; border: 1px solid #2a4a2a; }
  .source-tag.bing { background: #1a2a3a; color: #6abfef; border: 1px solid #2a4a5a; }
  .source-tag.wikipedia { background: #2a2a1a; color: #dada6a; border: 1px solid #4a4a2a; }
  .source-num {
    font-size: 0.65rem;
    color: #555;
  }
  .result-card a.title {
    font-size: 1.05rem;
    font-weight: 600;
    color: #8ab4f8;
    text-decoration: none;
    line-height: 1.3;
    display: block;
    margin-bottom: 3px;
  }
  .result-card a.title:hover { text-decoration: underline; }
  .result-card .url {
    font-size: 0.75rem;
    color: #5a8a5a;
    margin-bottom: 5px;
    word-break: break-all;
  }
  .result-card .snippet {
    font-size: 0.88rem;
    color: #999;
    line-height: 1.5;
  }

  .no-results {
    text-align: center;
    color: #666;
    padding: 40px;
    font-size: 1rem;
  }
  .error {
    text-align: center;
    color: #ef4444;
    padding: 20px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Obscura Metasearch</h1>
  <p>AI-Powered · Multi-Provider · Real-Time</p>
  <div class="provider-badges">
    <span class="badge">DuckDuckGo</span>
    <span class="badge">Bing</span>
    <span class="badge">Wikipedia</span>
    <span class="badge">glm-5.2</span>
  </div>
</div>

<div class="search-box">
  <input type="text" id="query" placeholder="Ask anything..." autocomplete="off">
  <button id="searchBtn" onclick="doSearch()">Search</button>
</div>

<div class="status" id="status"></div>

<div class="main-content" id="mainContent"></div>

<script>
const input = document.getElementById('query');
const btn = document.getElementById('searchBtn');
const statusEl = document.getElementById('status');
const contentEl = document.getElementById('mainContent');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = input.value.trim();
  if (!query) return;

  btn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span>Searching 3 providers in parallel...';
  contentEl.innerHTML = '';

  try {
    // Step 1: Metasearch
    const searchResp = await fetch('/api/search?q=' + encodeURIComponent(query));
    const searchData = await searchResp.json();

    if (searchData.error) {
      statusEl.textContent = '';
      contentEl.innerHTML = '<div class="error">Error: ' + escapeHtml(searchData.error) + '</div>';
      return;
    }

    const results = searchData.results || [];
    if (results.length === 0) {
      statusEl.textContent = '';
      contentEl.innerHTML = '<div class="no-results">No results found.</div>';
      return;
    }

    statusEl.innerHTML = '<span class="spinner"></span>Found ' + results.length + ' sources. Synthesizing answer...';

    // Render results immediately
    renderResults(results);

    // Step 2: Synthesize AI answer
    const synthResp = await fetch('/api/synthesize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, results: results }),
    });
    const synthData = await synthResp.json();

    statusEl.textContent = results.length + ' sources from DDG + Bing + Wikipedia';

    if (synthData.answer) {
      renderAnswer(synthData.answer, results);
    } else if (synthData.error) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error';
      errDiv.textContent = 'AI synthesis failed: ' + synthData.error;
      contentEl.insertBefore(errDiv, contentEl.firstChild);
    }

  } catch (err) {
    statusEl.textContent = '';
    contentEl.innerHTML = '<div class="error">Request failed: ' + escapeHtml(err.message) + '</div>';
  }

  btn.disabled = false;
}

function renderAnswer(answer, results) {
  // Convert [1], [2] citations to clickable superscript links
  var html = escapeHtml(answer).replace(
    /\[(\d+)\]/g,
    function(match, num) {
      var idx = parseInt(num) - 1;
      if (results[idx]) {
        var url = escapeAttr(results[idx].url);
        return '<a href="' + url + '" target="_blank"><sup>' + num + '</sup></a>';
      }
      return '<sup>' + num + '</sup>';
    }
  );

  var panel = document.createElement('div');
  panel.className = 'ai-answer';
  panel.innerHTML =
    '<div class="ai-answer-header">' +
      '<div class="icon">AI</div>' +
      '<span class="label">Synthesized Answer</span>' +
    '</div>' +
    '<div class="ai-answer-body">' + html + '</div>';

  contentEl.insertBefore(panel, contentEl.firstChild);
}

function renderResults(results) {
  var header = document.createElement('div');
  header.className = 'results-header';
  header.textContent = 'Sources (' + results.length + ')';
  contentEl.appendChild(header);

  var fragment = document.createDocumentFragment();
  results.forEach(function(r, i) {
    var card = document.createElement('div');
    card.className = 'result-card';

    var sourceClass = (r.source || 'unknown').toLowerCase();
    var sourceTag = sourceClass === 'duckduckgo' ? 'DDG' :
                    sourceClass === 'bing' ? 'BING' :
                    sourceClass === 'wikipedia' ? 'WIKI' :
                    sourceClass.toUpperCase().slice(0, 4);

    card.innerHTML =
      '<div class="source-row">' +
        '<span class="source-tag ' + sourceClass + '">' + sourceTag + '</span>' +
        '<span class="source-num">#' + (i + 1) + '</span>' +
      '</div>' +
      '<a class="title" href="' + escapeAttr(r.url) + '" target="_blank">' + escapeHtml(r.title) + '</a>' +
      '<div class="url">' + escapeHtml(r.url) + '</div>' +
      '<div class="snippet">' + escapeHtml(r.snippet) + '</div>';

    fragment.appendChild(card);
  });
  contentEl.appendChild(fragment);
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function escapeAttr(s) {
  return (s || '').replace(/"/g, '&quot;');
}
</script>

</body>
</html>
